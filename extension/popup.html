<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 15px; background-color: #121212; color: #fff; font-family: system-ui, sans-serif; margin: 0; }
    h3 { margin-top: 0; color: #40ff99; }
    input { width: 90%; padding: 10px; margin-bottom: 10px; background: #1e1e1e; border: 1px solid #333; color: #fff; border-radius: 4px; outline: none; }
    button { width: 100%; padding: 10px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button.success { background: #40ff99; color: #000; }
    .hidden { display: none; }
    #status { margin-top: 10px; font-size: 13px; color: #a0a0a0; text-align: center; }
  </style>
</head>
<body>

  <h3>Z-Coder Sync</h3>

  <div id="login-view">
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="login-btn">Log In to Engine</button>
  </div>

  <div id="sync-view" class="hidden">
    <p style="font-size: 14px; color: #ccc;">Ready to capture problem URL.</p>
    <button id="sync-btn">Save Current Page</button>
    <button id="logout-btn" style="margin-top: 10px; background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d;">Disconnect</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
